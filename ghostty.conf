# ============================================
# Ghostty 설정 (v1.3.0-tip)
# ============================================

# --- 폰트 ---
# brew install --cask font-cascadia-mono
# brew install --cask font-d2coding
font-family = "Cascadia Mono"
font-family = "D2Coding"
font-size = 15

# --- 테마 ---
theme = "Gruvbox Dark Hard"

# --- 키 설정 ---
macos-option-as-alt = true
key-remap = super=alt

# ============================================
# 화이트리스트 방식: 기본 바인딩 전부 제거 후 필요한 것만 등록
# super+ 바인딩은 macOS 메뉴가 key-remap보다 먼저 가로채므로
# 여기 등록한 super+ 키는 Ghostty 액션 실행 (Alt 변환 안 됨)
# 여기 없는 super+ 키는 key-remap → Alt+key로 터미널 전달
# ============================================
keybind = clear

# --- macOS 필수 ---
keybind = super+c=copy_to_clipboard:mixed
keybind = super+v=paste_from_clipboard
keybind = super+q=quit
keybind = super+n=new_window
keybind = super+t=new_tab
keybind = super+w=close_surface

# --- Ghostty 유틸리티 ---
keybind = super+shift+,=reload_config
keybind = super+enter=toggle_fullscreen
keybind = super+shift+p=toggle_command_palette

# --- 탭 이동 (Ctrl 기반 — key-remap 영향 없음) ---
keybind = ctrl+tab=next_tab
keybind = ctrl+shift+tab=previous_tab

# --- key-remap Shift+key 변환 보완 ---
# (text: 값 뒤에 인라인 주석 금지 — 주석도 텍스트로 전송됨)
keybind = alt+shift+[=text:\x1b{
keybind = alt+shift+]=text:\x1b}
keybind = alt+shift+,=text:\x1b<
keybind = alt+shift+.=text:\x1b>
keybind = alt+shift+/=text:\x1b?
keybind = alt+shift+-=text:\x1b_
keybind = alt+shift+3=text:\x1b#

# ============================================
# 아래는 clear로 제거된 Ghostty 기본 바인딩 전체 목록
# 필요하면 주석 해제하여 활성화 (단, super+ 키는 Alt 변환 대신 Ghostty 액션 실행)
# ============================================

# --- 폰트 크기 (활성화하면 Cmd+=/- 가 Alt+=/-  대신 폰트 크기 변경) ---
keybind = super+==increase_font_size:1
keybind = super++=increase_font_size:1
keybind = super+-=decrease_font_size:1
